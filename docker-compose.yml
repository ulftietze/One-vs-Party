services:
  db:
    image: mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3386:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASS: ${MYSQL_PASSWORD}
      APP_SECRET: ${APP_SECRET}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      PORT: ${BACKEND_PORT}
      PUBLIC_BASE_URL: http://localhost:${FRONTEND_PORT}
      JSON_BODY_LIMIT: ${JSON_BODY_LIMIT:-16mb}
      MEDIA_ROOT: /app/media
      UPLOAD_REQUEST_TIMEOUT_MS: 0
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - media_data:/app/media

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: /api
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT}:80"

  e2e:
    profiles: ["e2e"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.e2e
    environment:
      E2E_BASE_URL: http://frontend
      E2E_ADMIN_TOKEN: ${ADMIN_TOKEN}
      CI: "1"
    depends_on:
      - frontend
    command:
      - bash
      - -lc
      - |
        for i in {1..120}; do
          if curl -fsS http://frontend >/dev/null; then
            break
          fi
          sleep 1
        done
        npx playwright test

volumes:
  db_data:
  media_data:
